name: Release

on:
  push:
    branches: [main]
    paths:
      - 'Cargo.toml'

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  version-check:
    name: Check Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      changed: ${{ steps.check_tag.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get version
        id: get_version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Check tag
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.get_version.outputs.version }}" >/dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: ${{ matrix.label }}
    needs: version-check
    if: needs.version-check.outputs.changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: linux-amd64
            cuda: false
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: linux-amd64-cuda
            cuda: true
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
            cuda: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-amd64
            cuda: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-amd64-cuda
            cuda: true

    runs-on: ${{ matrix.os }}

    env:
      MACOSX_DEPLOYMENT_TARGET: "11.0"
      CMAKE_OSX_DEPLOYMENT_TARGET: "11.0"

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf clang cmake

      - name: Install Windows deps
        if: runner.os == 'Windows'
        run: choco install cmake llvm strawberryperl -y

      - name: Install macOS deps
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Install CUDA toolkit
        if: matrix.cuda
        uses: Jimver/cuda-toolkit@v0.2.18
        with:
          cuda: '12.6.2'
          method: network
          sub-packages: '["nvcc", "cudart"]'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.label }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mim-tauri/frontend/package-lock.json

      - name: Build frontend
        working-directory: mim-tauri/frontend
        run: npm ci && npm run build

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest

      - name: Build (CUDA)
        if: matrix.cuda
        working-directory: mim-tauri
        run: |
          cargo build --release --target ${{ matrix.target }} -p mim-ml --features cuda
          cargo tauri build --target ${{ matrix.target }}

      - name: Build (standard)
        if: ${{ !matrix.cuda }}
        working-directory: mim-tauri
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Collect Linux
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          for f in target/${{ matrix.target }}/release/bundle/deb/*.deb \
                   target/${{ matrix.target }}/release/bundle/rpm/*.rpm \
                   target/${{ matrix.target }}/release/bundle/appimage/*.AppImage; do
            [ -f "$f" ] && cp "$f" dist/
          done
          if [ "${{ matrix.cuda }}" = "true" ]; then
            cd dist && for f in *; do mv "$f" "${f%.*}-cuda.${f##*.}"; done
          fi

      - name: Collect macOS
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/bundle/dmg/*.dmg dist/ 2>/dev/null || true

      - name: Collect Windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          for f in target/${{ matrix.target }}/release/bundle/msi/*.msi \
                   target/${{ matrix.target }}/release/bundle/nsis/*.exe; do
            [ -f "$f" ] && cp "$f" dist/
          done
          if [ "${{ matrix.cuda }}" = "true" ]; then
            cd dist && for f in *; do mv "$f" "${f%.*}-cuda.${f##*.}"; done
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: mim-${{ matrix.label }}
          path: dist/*
          if-no-files-found: warn

  release:
    name: Release
    needs: [version-check, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ needs.version-check.outputs.version }}" -m "Release v${{ needs.version-check.outputs.version }}"
          git push origin "v${{ needs.version-check.outputs.version }}"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version-check.outputs.version }}
          name: Mim v${{ needs.version-check.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.AppImage
            artifacts/**/*.dmg
            artifacts/**/*.msi
            artifacts/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
