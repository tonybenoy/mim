name: Release

on:
  push:
    branches: [main]
    paths:
      - 'Cargo.toml'

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  version-check:
    name: Check Version Change
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      changed: ${{ steps.check_tag.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from Cargo.toml
        id: get_version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: check_tag
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: ${{ matrix.label }}
    needs: version-check
    if: needs.version-check.outputs.changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            label: linux-amd64
            cuda: false
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            label: linux-amd64-cuda
            cuda: true
          - target: aarch64-apple-darwin
            os: macos-latest
            label: macos-arm64
            cuda: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            label: windows-amd64
            cuda: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            label: windows-amd64-cuda
            cuda: true

    runs-on: ${{ matrix.os }}

    env:
      CARGO_INCREMENTAL: 0
      CARGO_NET_RETRY: 10
      RUSTUP_MAX_RETRIES: 10
      MACOSX_DEPLOYMENT_TARGET: "11.0"
      CMAKE_OSX_DEPLOYMENT_TARGET: "11.0"
      # Speed up C/C++ builds
      CMAKE_BUILD_PARALLEL_LEVEL: 4

    steps:
      - uses: actions/checkout@v4

      # ── System deps ────────────────────────────────────
      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf clang cmake

      - name: Install Windows deps
        if: runner.os == 'Windows'
        run: choco install cmake llvm -y

      - name: Install macOS deps
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Install CUDA toolkit
        if: matrix.cuda
        uses: Jimver/cuda-toolkit@v0.2.18
        with:
          cuda: '12.6.3'
          method: network
          sub-packages: '["nvcc", "cudart"]'

      # ── Toolchain ──────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ── Caching (sccache for C/C++ + cargo) ────────────
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Configure sccache
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> "$GITHUB_ENV"
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> "$GITHUB_ENV"
        shell: bash

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ matrix.label }}-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.label }}-registry-

      # ── Frontend ───────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mim-tauri/frontend/package-lock.json

      - name: Install & build frontend
        working-directory: mim-tauri/frontend
        run: npm ci && npm run build

      # ── Rust build ─────────────────────────────────────
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked || true

      - name: Build (CUDA)
        if: matrix.cuda
        working-directory: mim-tauri
        run: |
          cargo build --release --target ${{ matrix.target }} -p mim-ml --features cuda
          cargo tauri build --target ${{ matrix.target }}

      - name: Build (standard)
        if: ${{ !matrix.cuda }}
        working-directory: mim-tauri
        run: cargo tauri build --target ${{ matrix.target }}

      # ── Collect artifacts ──────────────────────────────
      - name: Collect (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/bundle/deb/*.deb dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/bundle/rpm/*.rpm dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/bundle/appimage/*.AppImage dist/ 2>/dev/null || true
          # Rename CUDA artifacts
          if [ "${{ matrix.cuda }}" = "true" ]; then
            for f in dist/*; do
              mv "$f" "${f%.*}-cuda.${f##*.}" 2>/dev/null || true
            done
          fi

      - name: Collect (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/bundle/dmg/*.dmg dist/ 2>/dev/null || true

      - name: Collect (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/bundle/msi/*.msi dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/bundle/nsis/*.exe dist/ 2>/dev/null || true
          if [ "${{ matrix.cuda }}" = "true" ]; then
            for f in dist/*; do
              mv "$f" "${f%.*}-cuda.${f##*.}" 2>/dev/null || true
            done
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mim-${{ matrix.label }}
          path: dist/*
          if-no-files-found: warn

  release:
    name: Create Release
    needs: [version-check, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag
        run: |
          VERSION="${{ needs.version-check.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version-check.outputs.version }}
          name: Mim v${{ needs.version-check.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.AppImage
            artifacts/**/*.dmg
            artifacts/**/*.msi
            artifacts/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
